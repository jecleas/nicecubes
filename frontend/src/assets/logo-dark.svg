<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" width="360" height="90" role="img" aria-label="NiceCubes">
  <!-- Refined Isometric cube icon tuned for Dark backgrounds -->
  <g transform="translate(8, 8)">
    <!-- Top face (Vibrant Blue) -->
    <polygon points="37,0 74,18 37,37 0,18" fill="#4B8BDE"/>
    <!-- Left face (Deep shadow, less dark than light mode) -->
    <polygon points="0,18 37,37 37,74 0,55" fill="#1A4A8F"/>
    <!-- Right face (Bright glowing highlight) -->
    <polygon points="74,18 37,37 37,74 74,55" fill="#8BBFF5"/>
  </g>

  <!-- Clean, heavy sans-serif wordmark in White -->
  <text 
    x="100" 
    y="60" 
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif" 
    font-weight="800" 
    font-size="48" 
    letter-spacing="-1.25" 
    fill="#FFFFFF">NiceCubes</text>
</svg>
