# fly.toml app configuration file generated for nicecubes on 2026-03-18T16:13:47+11:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nicecubes'
primary_region = 'syd'

[build]

[env]
  DATABASE_PATH = '/data/app.sqlite'
  FLASK_APP = 'app'
  FLASK_ENV = 'production'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
